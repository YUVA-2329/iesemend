<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNERGY AI - Redirecting</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#ffffff,#f3f6ff);
    overflow:hidden;
}

.bg{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%,rgba(0,123,255,.15),transparent 35%),
    radial-gradient(circle at 80% 80%,rgba(138,43,226,.15),transparent 35%);
}

.card{
    position:relative;
    z-index:10;
    width:min(700px,90%);
    padding:50px;
    text-align:center;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.5);
    border-radius:30px;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.logo{
    font-size:64px;
    font-weight:900;
    letter-spacing:4px;
    background:linear-gradient(90deg,#0066ff,#7b2cff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    margin-top:12px;
    color:#555;
    font-size:18px;
}

.message{
    margin-top:30px;
    color:#222;
    font-size:20px;
}

.countdown{
    margin-top:25px;
    font-size:42px;
    font-weight:800;
    color:#0066ff;
}

.status{
    margin-top:15px;
    color:#777;
}

.button{
    display:inline-block;
    margin-top:30px;
    padding:14px 28px;
    border-radius:12px;
    background:#0066ff;
    color:white;
    text-decoration:none;
    font-weight:700;
    transition:.3s;
}

.button:hover{
    transform:translateY(-2px);
}

.loader{
    width:60px;
    height:60px;
    margin:25px auto;
    border:4px solid rgba(0,0,0,.08);
    border-top:4px solid #0066ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
    <div class="logo">SYNERGY AI</div>

    <div class="subtitle">
        AI-Powered Startup Intelligence Platform
    </div>

    <div class="loader"></div>

    <div class="message">
        You are being redirected to the latest version of Synergy AI
    </div>

    <div class="countdown" id="countdown">5</div>

    <div class="status">
        Connecting to latest deployment...
    </div>

    <a class="button" href="PASTE_NEW_LINK_HERE">
        Launch Latest Version
    </a>
</div>

<script>

const NEW_URL = "PASTE_NEW_LINK_HERE";

console.log("[SYNERGY AI] Initializing redirect...");
console.log("[SYNERGY AI] Latest deployment detected");

let count = 5;

const timer = setInterval(() => {

    count--;

    document.getElementById("countdown").innerText = count;

    if(count <= 0){

        clearInterval(timer);

        console.log("[SYNERGY AI] Redirecting user...");

        window.location.replace(NEW_URL);

    }

},1000);

</script>

</body>
</html>
